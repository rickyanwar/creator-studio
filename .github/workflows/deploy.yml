name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "── Pulling latest code ──"
            cd /opt/studio
            git pull origin main

            echo "── Rebuilding images ──"
            docker compose -f docker-compose.server.yml build

            echo "── Restarting services ──"
            docker compose -f docker-compose.server.yml up -d --remove-orphans

            echo "── Reloading nginx ──"
            docker compose -f docker-compose.server.yml restart nginx

            echo "── Running migrations ──"
            docker compose -f docker-compose.server.yml exec -T api alembic upgrade head

            echo "── Pruning unused images + build cache ──"
            docker system prune -f

            echo "✓ Deploy complete"
